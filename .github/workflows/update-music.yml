name: Update Music Data

on:
  schedule:
    - cron: '0 0 * * 1'  # Run every Monday at midnight UTC (7 AM Jakarta Time)
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-music:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          
      - name: Set up Python
        run: uv python install 3.10
          
      - name: Install dependencies
        run: |
          uv sync
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          
      - name: Update music data
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: python scripts/update_lastfm.py
        
      - name: Commit and push if changed
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add _data/music.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update music data" && git push)

