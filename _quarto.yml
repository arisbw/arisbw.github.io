project:
  type: website
  output-dir: _site
  resources:
    - assets/
  render:
    - "*.qmd"
    - "*.ipynb"
    - "!/.github/"
    - "!/.venv/"
  preview:
    port: 4200
    browser: true

website:
  title: "Aris Budi Wibowo"
  description: "Senior Data Analyst | Data Science, ML, and Experimentation."
  site-url: "https://arisbw.github.io"
  repo-url: "https://github.com/arisbw/arisbw.github.io"
  twitter-card: true
  open-graph: true
  navbar:
    left:
      - href: index.qmd
        text: Home
      - text: "Blog"
        menu:
          - text: "All Posts"
            href: posts.qmd
          - text: "Data & Tech"
            href: data-posts.qmd
          - text: "Personal"
            href: personal-posts.qmd
      - about.qmd
      - resume.qmd


format:
  html:
    execute:
      echo: false
      warning: false
      freeze: auto
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    code-copy: true
    code-overflow: wrap
    include-before-body: _partials/before-body.html

